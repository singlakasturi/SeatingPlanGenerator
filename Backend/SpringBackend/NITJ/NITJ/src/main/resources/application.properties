# ==========================
# ? Server Configuration
# ==========================
server.port=8081
spring.application.name=seatingplan-backend

# ==========================
# ? Mock Mode
# ==========================
# ? This flag tells StudentDataService to generate fake roll numbers
studentdata.mock=false

# ==========================
# ?? MySQL Configuration (kept for later)
# ==========================
# ?? Won?t be used while mock=true, but keeps Spring from complaining
#spring.datasource.url=jdbc:mysql://localhost:3306/seatingdb
#spring.datasource.username=root
#spring.datasource.password=yourpassword
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# We?re using JdbcTemplate manually (no JPA needed)
#spring.jpa.hibernate.ddl-auto=none

# ==========================
# ? CORS Settings
# ==========================
spring.web.cors.allowed-origins=http://localhost:5000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

studentdata.excel.path=classpath:Students3.xlsx

# ==========================
# ? Logging (useful for debugging during tests)
# ==========================
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.springframework.web=INFO
logging.level.root=INFO

# ==========================
# ? JWT Secret (shared with Node backend)
# ==========================
jwt.secret=mySharedNodeSecretKey